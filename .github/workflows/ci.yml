name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        env:
          # Build Next.js sans vraie DB (fallback turso.ts)
          TURSO_DATABASE_URL: http://127.0.0.1:8080
          TURSO_AUTH_TOKEN: ci-placeholder
          AUTH_SECRET: ci-build-placeholder-secret-min-32-chars!!
        run: npm run build
